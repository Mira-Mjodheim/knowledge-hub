type User {
    id: ID!
    username: String!
    email: String!
    knowledge: [Knowledge!]!
}

type Knowledge {
    id: ID!
    title: String!
    description: String
    categories: [String!]
    tags: [String!]
    createdBy: User!
    createdAt: String!
    updatedAt: String!
}

type AuthPayload {
    token: String!
    user: User!
}

type Query {
    users: [User!]!
    user(id: ID!): User
    me: User
    knowledges: [Knowledge!]!
    knowledge(id: ID!): Knowledge
}

type Mutation {
    register(username: String!, email: String!, password: String!): AuthPayload!
    login(email: String!, password: String!): AuthPayload!
    updateUser(id: ID!, username: String, email: String): User!
    deleteUser(id: ID!): Boolean!
    createKnowledge(title: String!, content: String!, authorId: ID!): Knowledge!
    updateKnowledge(id: ID!, title: String, content: String): Knowledge!
    deleteKnowledge(id: ID!): Boolean!
}

schema {
    query: Query
    mutation: Mutation
}
